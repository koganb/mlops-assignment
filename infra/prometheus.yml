global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: vllm
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
  - job_name: agent
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: /metrics
